<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="#2b2b2b" stroke-linecap="round" stroke-linejoin="round">
  <!-- ears (solid, like the reference's dark ear tips) -->
  <path d="M26,34 L18,8 L44,26 Z" fill="#2b2b2b" stroke="none"/>
  <path d="M74,34 L82,8 L56,26 Z" fill="#2b2b2b" stroke="none"/>

  <!-- head -->
  <circle cx="50" cy="56" r="32" fill="#fff" stroke-width="4.5"/>

  <!-- cheek patch, echoes the tabby patch in the reference -->
  <path d="M22,46 Q18,58 26,70 Q30,60 26,48 Z" fill="#2b2b2b" stroke="none"/>

  <!-- big round eyes -->
  <circle cx="39" cy="54" r="11" fill="#fff" stroke-width="4"/>
  <circle cx="63" cy="55" r="10" fill="#fff" stroke-width="4"/>
  <circle cx="39" cy="52" r="3" fill="#2b2b2b" stroke="none"/>
  <circle cx="63" cy="53" r="2.8" fill="#2b2b2b" stroke="none"/>

  <!-- nose + smile -->
  <path d="M48,66 Q50,68 52,66" stroke-width="3" fill="none"/>
  <path d="M50,66 L50,69" stroke-width="3" fill="none"/>

  <!-- whiskers -->
  <path d="M16,58 L2,54 M16,64 L2,66" stroke-width="2.5" fill="none"/>
  <path d="M86,58 L98,56 M86,64 L98,68" stroke-width="2.5" fill="none"/>

  <!-- curled tail peeking from behind -->
  <path d="M80,78 Q96,74 96,60 Q96,50 87,52 Q80,54 83,62" fill="none" stroke-width="5"/>
</svg>
